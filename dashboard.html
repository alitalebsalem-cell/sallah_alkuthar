<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم / Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #705f34 0%, #325247 50%, #414935 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, 'Segoe UI', Tahoma, sans-serif;
      padding: 20px;
      direction: rtl;
    }
    .dashboard {
      background: #fff;
      border-radius: 24px;
      padding: 40px 36px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      text-align: center;
    }
    .dashboard .logo {
      width: 1.93in;
      height: 1.34in;
      margin-bottom: 14px;
    }
    .dashboard h1 {
      font-size: 24px;
      font-weight: 800;
      color: #111;
      margin-bottom: 4px;
    }
    .dashboard .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 28px;
    }
    .dashboard .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .dashboard .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 20px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all .2s;
      color: #fff;
    }
    .btn-store {
      background: #C9B99A;
      box-shadow: 0 4px 14px rgba(201,185,154,.3);
    }
    .btn-store:hover { background: #B8A88A; transform: translateY(-2px); }
    .btn-admin {
      background: #1a73e8;
      box-shadow: 0 4px 14px rgba(26,115,232,.3);
    }
    .btn-admin:hover { background: #1557b0; transform: translateY(-2px); }
    .btn-invoices {
      background: #f9a825;
      box-shadow: 0 4px 14px rgba(249,168,37,.3);
    }
    .btn-invoices:hover { background: #e69500; transform: translateY(-2px); }
    .btn .icon { font-size: 22px; }
    @media (max-width:480px){
      .dashboard { padding: 28px 20px; }
      .dashboard h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <img src="images/logo.png" class="logo" alt="Logo" onerror="this.style.display='none'">
    <h1> </h1>
    <p class="subtitle"> </p>
    <div class="btn-group">
      <a href="index.html" class="btn btn-store"><span class="icon">🛒</span> المتجر / Store</a>
      <a href="admin.html" class="btn btn-admin"><span class="icon">⚙️</span> لوحة الإدارة / Admin Panel</a>
      <a href="invoices-view.html" class="btn btn-invoices"><span class="icon">📄</span> عرض الفواتير / Invoices View</a>
    </div>
  </div>
</body>
</html>
