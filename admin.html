<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الإدارة - تموينات سلة الكوثر</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="admin-box">

<h1>إضافة / تعديل منتج</h1>

<input
id="name"
placeholder="اسم المنتج">

<input
id="description"
placeholder="الوصف">

<input
id="code"
placeholder="الكود">

<input
id="price"
type="number"
placeholder="السعر">

<select id="category">

<option value="مشروبات">مشروبات</option>

<option value="منظفات">منظفات</option>

<option value="حلويات">حلويات</option>

<option value="معلبات">معلبات</option>

<option value="مجمدات">مجمدات</option>

</select>

<input
id="image"
placeholder="رابط الصورة">

<button id="save">

حفظ المنتج

</button>

<hr>

<h2>جميع المنتجات</h2>

<input
id="searchAdmin"
placeholder="ابحث عن منتج">

<div id="productsTable">

</div>

</div>

<script
type="module"
src="js/admin.js">
</script>

</body>

</html>
