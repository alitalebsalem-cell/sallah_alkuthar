<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Administration Panel / لوحة الإدارة
</title>

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<div class="admin-box">

<h1>

Add / Edit Product
<br>
إضافة / تعديل منتج

</h1>

<input
id="name"
placeholder="Arabic Name / الاسم بالعربي">

<input
id="description"
placeholder="English Name / الاسم بالإنجليزي">

<input
id="code"
placeholder="Product Code / كود المنتج">

<select id="category">

<option value="Foodstuffs / مواد غذائية
">

Foodstuffs / مواد غذائية

</option>

<option value="Vegetables / خضار
">

Vegetables / خضار

</option>

<option value="Detergents / منظفات
">

Detergents / منظفات

</option>

</select>

<input
id="image"
placeholder="Image URL / رابط الصورة">

<div
style="
text-align:center;
margin:15px 0;
">

<img
id="previewImage"
src="https://via.placeholder.com/150"

style="
width:150px;
height:150px;
object-fit:contain;
border:1px solid #ddd;
border-radius:10px;
padding:10px;
background:white;
">

</div>

<button id="save">

💾 Save Product / حفظ المنتج

</button>

<hr>

<h2>

All Products / جميع المنتجات

</h2>

<input
id="searchAdmin"
placeholder="Search Product / البحث عن منتج">

<br><br>

<div class="sort-buttons">

<button id="sortNewest">

Newest First
<br>
الأحدث

</button>

<button id="sortOldest">

Oldest First
<br>
الأقدم

</button>

<button id="sortNameAsc">

A → Z
<br>
أ → ي

</button>

</div>

<br>

<div id="productsTable">

</div>

</div>

<script
type="module"
src="js/admin.js">
</script>

<script>

document
.getElementById("image")
.addEventListener("input",function(){

document
.getElementById("previewImage")
.src =

this.value ||

"https://via.placeholder.com/150";

});

</script>

</body>

</html>
