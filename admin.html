<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة الإدارة</title>

<style>

body{
font-family:tahoma;
background:#f5f5f5;
padding:20px;
}

.box{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
}

button{
width:100%;
padding:15px;
background:#009688;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h1>إضافة منتج</h1>

<input id="name" placeholder="اسم المنتج">

<input id="price" placeholder="السعر">

<button id="save">
حفظ المنتج
</button>

</div>

<script type="module">

import { db } from "./js/firebase.js";

import {
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

document
.getElementById("save")
.addEventListener("click",async()=>{

await addDoc(
collection(db,"products"),
{
name:
document.getElementById("name").value,

price:
Number(
document.getElementById("price").value
),

createdAt:
new Date()
}
);

alert("تم الحفظ");

});

</script>

</body>
</html>
