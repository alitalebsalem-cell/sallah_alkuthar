<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لوحة الإدارة - Administration panel
</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="admin-box">

<h1>Add/edit</h1>

<input
id="name"
placeholder="الاسم بالعربي/Arabic Name">

<input
id="description"
placeholder="English Name/الاسم بالانجليزي">

<input
id="code"
placeholder="Code/الكود">



<select id="category">

<option value="مواد غذائية/foodstuffs">مواد غذائية/foodstuffs</option>


<option value=" vegetable/خضار
"> vegetable/خضار
</option>

<option value="Detergents/منظفات
">Detergents/منظفات
</option>


</select>

<input
id="image"
placeholder="رابط الصورة/image link">

<button id="save">

حفظ المنتج/Save

</button>

<hr>

<h2>جميع المنتجات/All Products</h2>

<input
id="searchAdmin"
placeholder="ابحث عن منتج/Search">

<br><br>

<div class="sort-buttons">

<button id="sortNewest">
الأحدث/Newest
</button>

<button id="sortOldest">
الأقدم/Oldest
</button>

<button id="sortNameAsc">
الاسم أ-ي/NameAsc A-Z
</button>


</div>

<br>

<div id="productsTable">

</div>

</div>

<script
type="module"
src="js/admin.js">
</script>

</body>

</html>
