<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تموينات ستبلة الكوثر</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<!-- سلة عائمة -->

<div class="cart-icon" id="cartToggle">

🛒

<span id="cartCount">0</span>

</div>

<!-- القائمة الجانبية للسلة -->

<div class="cart-sidebar" id="cartSidebar">

<div class="cart-header">

<h2>سلة المشتريات/Cart</h2>

<button id="closeCart">✖</button>

</div>

<div id="cartItems"></div>

<div class="cart-footer">



<input
type="text"
id="customerName"
placeholder="اسم العميل/customerName">


<button id="createInvoice">

📄 إنشاء فاتورة

</button>

</div>

</div>

<!-- الهيدر -->

<header>

<img
src="images/logo.png"
class="logo"
alt="Logo">

<h1>

تموينات سنبلة الكوثر

</h1>

<input
type="text"
id="search"
placeholder="ابحث عن منتج/Search...">

</header>

<!-- التصنيفات -->

<div class="categories">

<button class="cat-btn" data-cat="الكل/All
">

الكل/All

</button>


<button class="cat-btn" data-cat="مواد غذائية/foodstuffs
">
مواد غذائية/foodstuffs
</button>

<button class="cat-btn" data-cat=" vegetable/خضار
">
 vegetable/خضار
</button>

<button class="cat-btn" data-cat="Detergents/منظفات
">
Detergents/منظفات
</button>

</div>

<!-- المنتجات -->

<main>

<div class="products-section">

<div id="products"></div>

</div>

</main>

<!-- قالب الفاتورة -->

<div
id="invoiceTemplate"
style="display:none;">

<div class="invoice-box">

<div class="invoice-header">

<img
src="images/logo.png"
class="invoice-logo">

<h1>

تموينات سنبلة الكوثر

</h1>

<p>

نقطة بيع إلكترونية

</p>

</div>

<div class="invoice-info">

<div>

رقم الفاتورة/INV NO:

<strong id="invoiceNo"></strong>

</div>

<div>

التاريخ/Date:

<strong id="invoiceDate"></strong>

</div>

<div>

العميل/Customer:

<strong id="invoiceCustomer"></strong>

</div>

</div>

<div class="invoice-qr">

<img
src="images/whatsapp-qr.png"
width="120">

<p>

966538647362+

</p>

</div>

<table id="invoiceTable">

<thead>

<tr>

<th>الصورة/Picture</th>

<th>الكود/Code</th>

<th>الوصف/description</th>

<th>الكمية/Qty</th>


</tr>

</thead>

<tbody id="invoiceBody">

</tbody>

</table>

<div class="invoice-total">

عدد الأصناف/Product NO :

<span id="invoiceTotal">
0
</span>

</div>
<div class="invoice-footer">

شكراً لتسوقكم من تموينات سنبلة الكوثر

</div>

</div>

</div>

<script
type="module"
src="js/app.js"></script>

</body>

</html>
