<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">



<link rel="stylesheet"
href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<!-- CART ICON -->

<div
class="cart-icon"
id="cartToggle">

🛒

<span id="cartCount">

0

</span>

</div>

<!-- CART SIDEBAR -->

<div
class="cart-sidebar"
id="cartSidebar">

<div class="cart-header">

<h2>

Shopping Cart
سلة المشتريات

</h2>

<button id="closeCart">

✖

</button>

</div>

<div id="cartItems">

</div>

<div class="cart-footer">

<h3>

<span id="cartTotal">

0

</span>

</h3>
<input
type="text"
id="customerName"

placeholder="
Customer Name
اسم العميل
">


<button id="createInvoice">

📄 Create Invoice
إنشاء فاتورة

</button>

</div>

</div>

<!-- HEADER -->

<header>

<img
src="images/logo.png"
class="logo"
alt="Logo">

<h1>


<br>

تموينات سنبلة الكوثر

</h1>

<input
type="text"
id="search"

placeholder="
Search 
">

</header>

<!-- CATEGORIES -->
<div class="categories">

<button
class="cat-btn"
data-cat="all">

All Products
<br>
جميع المنتجات

</button>

<button
class="cat-btn"
data-cat="مواد غذائية">

Foodstuffs
<br>
مواد غذائية

</button>

<button
class="cat-btn"
data-cat="خضار">

Vegetables
<br>
خضار

</button>

<button
class="cat-btn"
data-cat="منظفات">

Detergents
<br>
منظفات

</button>

</div>

<!-- PRODUCTS -->

<main>

<div class="products-section">

<div id="products">

</div>

</div>

</main>
<!-- INVOICE -->

<div
id="invoiceTemplate"
style="display:none;">

<div class="invoice-box">

<div class="invoice-header">

<img
src="images/logo.png"
class="invoice-logo">

</div>

<div class="invoice-info">

<div>

INV NO
<br>
رقم الفاتورة
<br>

<strong id="invoiceNo"></strong>

</div>

<div>

DATE
<br>
التاريخ
<br>

<strong id="invoiceDate"></strong>

</div>

<div>

CUSTOMER
<br>
العميل
<br>

<strong id="invoiceCustomer"></strong>

</div>

</div>

<table id="invoiceTable">

<thead>

<tr>

<th>Picture</th>

<th>Code</th>

<th>Description</th>

<th>Qty</th>

</tr>

</thead>

<tbody id="invoiceBody">

</tbody>

</table>

<div class="invoice-total">

Items

<br>

<span id="invoiceTotal">0</span>

</div>

</div>

</div>

<script
type="module"
src="js/app.js">
</script>

</body>

</html>
