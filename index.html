<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سمسم - متجر</title>
<link rel="stylesheet" href="css/style.css?v=20260714-2">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<a href="cart.html" class="cart-icon" id="cartIconLink">
  🛒
  <span id="cartCount">0</span>
</a>

<header class="store-header">
  <div class="header-row">
    <div class="header-right" style="display:flex;align-items:center;gap:8px;">
      <button id="langToggle" class="lang-toggle-btn" type="button">EN</button>
      <button id="loginBtn" class="login-btn" type="button">🔑 دخول</button>
      <div id="userProfile" class="user-profile" style="display:none">
        <button id="profileToggle" class="profile-toggle-btn" type="button">
          <span class="profile-avatar" id="profileAvatar"></span>
          <span id="loggedInUser"></span> ▾
        </button>
        <div id="profileDropdown" class="profile-dropdown">
          <div class="profile-dropdown-item"><strong>الاسم:</strong> <span id="profileName"></span></div>
          <div class="profile-dropdown-item"><strong>النوع:</strong> <span id="profileType"></span></div>
          <div class="profile-dropdown-item"><strong>PIN:</strong> <span id="profilePin">****</span> <button id="profileTogglePin" type="button">إظهار</button></div>
          <div class="profile-dropdown-item"><button id="profileChangePinBtn" type="button">🔑 تغيير كلمة المرور</button></div>
          <div class="profile-dropdown-item"><button id="profileInvoicesBtn" type="button">📄 فواتيري</button></div>
          <div class="profile-dropdown-item"><button id="profileLogoutBtn" type="button" style="background:rgba(220,53,69,.1);color:#dc3545;">🚪 تسجيل الخروج</button></div>
        </div>
      </div>
    </div>
    <div class="header-center">
      <img src="images/logo.png" class="logo" alt="سمسم">
    </div>
    <div class="header-left"></div>
  </div>
  <hr>
  <input type="text" id="search" placeholder="🔍 ابحث عن منتج..." disabled>
</header>

<!-- LOGIN REQUIRED OVERLAY -->
<div id="loginRequiredOverlay" class="login-required-overlay">
  <div class="login-required-card">
    <img src="images/logo.png" alt="Logo" style="width:120px;height:auto;margin:0 auto 16px;" onerror="this.style.display='none'">
    <h2 style="color:var(--dark);font-size:24px;margin-bottom:8px;">مرحباً بك في سمسم</h2>
    <p style="color:var(--secondary);margin-bottom:20px;">سجّل دخولك للوصول إلى المنتجات</p>
    <button id="loginRequiredBtn" type="button" style="padding:14px 32px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--dark),var(--accent));color:#fff;font-size:16px;font-weight:800;cursor:pointer;">🔑 تسجيل الدخول</button>
  </div>
</div>

<!-- CATEGORIES -->
<div class="categories" id="categoriesBar" style="display:none;">
  <div class="cat-card" data-cat="قسم المعمل">
    <span class="cat-icon">🔬</span>
    <span class="cat-label" data-i18n-cat="قسم المعمل">قسم المعمل</span>
  </div>
  <div class="cat-card" data-cat="قسم السوبرماركت">
    <span class="cat-icon">🛒</span>
    <span class="cat-label" data-i18n-cat="قسم السوبرماركت">قسم السوبرماركت</span>
  </div>
  <div class="cat-card" data-cat="قسم محلات الجملة">
    <span class="cat-icon">🏪</span>
    <span class="cat-label" data-i18n-cat="قسم محلات الجملة">محلات الجملة</span>
  </div>
  <div class="cat-card" data-cat="قسم المستودع">
    <span class="cat-icon">🏭</span>
    <span class="cat-label" data-i18n-cat="قسم المستودع">قسم المستودع</span>
  </div>
  <div class="cat-card" data-cat="احتياجات المعمل">
    <span class="cat-icon">📋</span>
    <span class="cat-label" data-i18n-cat="احتياجات المعمل">احتياجات المعمل</span>
  </div>
</div>

<!-- PRODUCTS (hidden until login) -->
<main style="display:none;" id="productsMain">
  <div class="products-section">
    <div id="products"></div>
  </div>
</main>

<!-- LOGIN MODAL -->
<div id="loginModal" class="modal-overlay" aria-hidden="true" hidden>
  <div class="modal-dialog login-dialog">
    <button id="loginModalClose" class="modal-close-btn" type="button">&times;</button>
    <img src="images/logo.png" class="login-logo" alt="Logo" onerror="this.style.display='none'">
    <h2>تسجيل الدخول</h2>
    <p class="login-subtitle">اختر نوع الحساب والاسم وأدخل كلمة المرور</p>
    <select id="loginAccountType" class="login-select">
      <option value="">-- نوع الحساب --</option>
      <option value="حساب معمل">حساب معمل</option>
      <option value="حساب فرع">حساب فرع</option>
    </select>
    <select id="loginName" class="login-select" style="display:none;">
      <option value="">-- اختر الاسم --</option>
    </select>
    <input type="password" id="loginPin" placeholder="كلمة المرور (4 أرقام)" maxlength="4" inputmode="numeric" autocomplete="off" style="display:none;">
    <button id="loginSubmit" type="button" style="display:none;">دخول</button>
    <div id="loginError" class="login-error"></div>
  </div>
</div>

<!-- INVOICES MODAL -->
<div id="invoicesModal" class="modal-overlay" aria-hidden="true" hidden>
  <div class="modal-dialog invoices-dialog">
    <button id="invoicesModalClose" class="modal-close-btn" type="button">&times;</button>
    <h2>📄 فواتيري</h2>
    <p class="invoices-subtitle" id="invoicesSubtitle"></p>
    <div id="invoicesList" class="invoices-list"></div>
    <button id="invoicesCloseBtn" type="button" class="invoices-close-btn">إغلاق</button>
  </div>
</div>

<!-- INVOICE DETAIL MODAL -->
<div id="invoiceDetailModal" class="modal-overlay" aria-hidden="true" hidden>
  <div class="modal-dialog invoice-detail-dialog">
    <button id="invoiceDetailClose" class="modal-close-btn" type="button">&times;</button>
    <div id="invoiceDetailContent"></div>
  </div>
</div>

<script type="module" src="js/app.js?v=20260714-2"></script>

<!-- FLOATING MENU -->
<button class="dash-menu-btn" id="dashMenuBtn" aria-label="القائمة"><span></span><span></span><span></span></button>
<div class="dash-menu-dropdown" id="dashMenuDropdown">
  <a href="index.html"><span class="dash-icon">🛒</span> المتجر</a>
  <a href="cart.html"><span class="dash-icon">📋</span> السلة</a>
  <a href="admin.html"><span class="dash-icon">⚙️</span> لوحة الإدارة</a>
  <a href="invoices-view.html"><span class="dash-icon">📄</span> عرض الفواتير</a>
  <a href="dashboard.html"><span class="dash-icon">🏠</span> Dashboard</a>
</div>
<script>
document.addEventListener("click",function(e){
  var btn=document.getElementById("dashMenuBtn"),menu=document.getElementById("dashMenuDropdown");
  if(!btn||!menu)return;
  if(btn.contains(e.target)){btn.classList.toggle("active");menu.classList.toggle("show");}
  else{btn.classList.remove("active");menu.classList.remove("show");}
});
</script>
</body>
</html>
