<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تموينات سلة الكوثر</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<img src="images/logo.png" class="logo">

<h1>تموينات سلة الكوثر</h1>

<input
type="text"
id="search"
placeholder="ابحث عن منتج...">

</header>

<div class="categories">

<button class="cat-btn" data-cat="الكل">الكل</button>

<button class="cat-btn" data-cat="مشروبات">مشروبات</button>

<button class="cat-btn" data-cat="منظفات">منظفات</button>

<button class="cat-btn" data-cat="حلويات">حلويات</button>

<button class="cat-btn" data-cat="معلبات">معلبات</button>

<button class="cat-btn" data-cat="مجمدات">مجمدات</button>

</div>

<div class="store-layout">

<div class="cart-section">

<h2>🛒 سلة المشتريات</h2>

<p>
عدد المنتجات:
<span id="cartCount">0</span>
</p>

<div id="cartItems"></div>

<hr>

<h3>
الإجمالي:
<span id="cartTotal">
0
</span>
ريال
</h3>
<input
id="customerName"
placeholder="اسم العميل">
<button id="clearCart">
🗑 مسح السلة
</button>

<br><br>

<button id="createInvoice">
📄 إنشاء فاتورة
</button>

</div>

<div class="products-section">

<div id="products"></div>

</div>

</div>
<div id="invoiceTemplate" style="display:none;">

<div class="invoice-box">

<div class="invoice-header">

<img
src="images/logo.png"
class="invoice-logo">

<h1>
تموينات سلة الكوثر
</h1>

</div>

<div class="invoice-info">

<div>
رقم الفاتورة:
<span id="invoiceNo"></span>
</div>

<div>
التاريخ:
<span id="invoiceDate"></span>
</div>

<div>
العميل:
<span id="invoiceCustomer"></span>
</div>

</div>

<div class="invoice-qr">

<img
src="images/whatsapp-qr.png"
width="120">

<p>
966538647362+
</p>

</div>

<table id="invoiceTable">

<thead>

<tr>

<th>المنتج</th>

<th>الكود</th>

<th>الكمية</th>

<th>السعر</th>

<th>الإجمالي</th>

</tr>

</thead>

<tbody id="invoiceBody">

</tbody>

</table>

<h2>

الإجمالي النهائي:

<span id="invoiceTotal"></span>

ريال

</h2>

</div>

</div>
<script
type="module"
src="js/app.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>

</html>
